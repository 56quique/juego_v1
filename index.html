<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SCADA - Grupo Electrógeno</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">

  <!-- TENSIÓN -->
  <div class="row">
    <div class="gauge-v" id="vL1"><span>L1</span></div>
    <div class="gauge-v" id="vL2"><span>L2</span></div>
    <div class="gauge-v" id="vL3"><span>L3</span></div>
  </div>

  <!-- CORRIENTE -->
  <div class="row">
    <div class="gauge-v" id="iL1"><span>L1</span></div>
    <div class="gauge-v" id="iL2"><span>L2</span></div>
    <div class="gauge-v" id="iL3"><span>L3</span></div>
  </div>

  <!-- FRECUENCIA (horizontal) -->
  <div class="row">
    <div class="gauge-h" id="freq"><span>Hz</span></div>
  </div>

  <!-- IMAGEN -->
  <div class="generador-wrapper">
    <img src="img/grupo_electrogeno-removebg-preview.png" class="generador-img">
  </div>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
