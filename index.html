<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>ATS - Panel SCADA PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
:root{
  --bg:#0b1220; --card:#111827; --muted:#9ca3af; --accent:#38bdf8;
}
body{
  margin:0; font-family: Arial;
  background:var(--bg); color:#e5e7eb;
}
.header{
  text-align:center; padding:12px; color:#38bdf8;
}
.container{
  display:grid; gap:12px; padding:12px;
  grid-template-columns:1fr;
}
@media (min-width:600px){
  .container{grid-template-columns:repeat(2,1fr);}
}
.card{
  background:var(--card);
  border-radius:12px;
  padding:12px;
  text-align:center;
}

/* ALARMA */
.alarm{
  display:none;
  padding:10px;
  border-radius:8px;
  background:#7f1d1d;
  color:#fecaca;
}
.alarm.active{display:block;}

/* GAUGE */
.gauges{
  display:flex;
  justify-content:space-around;
}

.value{
  font-weight:bold;
}

/* SVG */
svg{width:100%; max-width:140px;}

</style></head><body><div class="header">⚡ ATS - Panel</div><div class="container"><div class="card">
<h3>Alarmas</h3>
<div id="alarm" class="alarm">Falla por rango</div>
</div><!-- TENSION --><div class="card">
<h3>Tensión</h3>
<div class="gauges"><div>
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 80 20" stroke="#ef4444" stroke-width="10" fill="none"/>
<path d="M80 20 A90 90 0 0 1 140 20" stroke="#22c55e" stroke-width="10" fill="none"/>
<path d="M140 20 A90 90 0 0 1 190 100" stroke="#ef4444" stroke-width="10" fill="none"/>
<g id="needleV1" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="v1" class="value"></div>
</div><div>
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 80 20" stroke="#ef4444" stroke-width="10"/>
<path d="M80 20 A90 90 0 0 1 140 20" stroke="#22c55e" stroke-width="10"/>
<path d="M140 20 A90 90 0 0 1 190 100" stroke="#ef4444" stroke-width="10"/>
<g id="needleV2" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="v2" class="value"></div>
</div><div>
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 80 20" stroke="#ef4444" stroke-width="10"/>
<path d="M80 20 A90 90 0 0 1 140 20" stroke="#22c55e" stroke-width="10"/>
<path d="M140 20 A90 90 0 0 1 190 100" stroke="#ef4444" stroke-width="10"/>
<g id="needleV3" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="v3" class="value"></div>
</div></div>
</div><!-- CORRIENTE --><div class="card">
<h3>Corriente</h3>
<div class="gauges"><div>
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 100 20" stroke="#22c55e" stroke-width="10"/>
<path d="M100 20 A90 90 0 0 1 140 40" stroke="#f59e0b" stroke-width="10"/>
<path d="M140 40 A90 90 0 0 1 190 100" stroke="#ef4444" stroke-width="10"/>
<g id="needleI1" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="i1" class="value"></div>
</div><div>
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 100 20" stroke="#22c55e" stroke-width="10"/>
<path d="M100 20 A90 90 0 0 1 140 40" stroke="#f59e0b" stroke-width="10"/>
<path d="M140 40 A90 90 0 0 1 190 100" stroke="#ef4444" stroke-width="10"/>
<g id="needleI2" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="i2" class="value"></div>
</div><div>
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 100 20" stroke="#22c55e" stroke-width="10"/>
<path d="M100 20 A90 90 0 0 1 140 40" stroke="#f59e0b" stroke-width="10"/>
<path d="M140 40 A90 90 0 0 1 190 100" stroke="#ef4444" stroke-width="10"/>
<g id="needleI3" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="i3" class="value"></div>
</div></div>
</div></div><script>

// rangos
const VMIN=0, VMAX=270;
const IMIN=0, IMAX=200;

// colores
function colorTension(v){
  if(v<210) return "red";
  if(v<=240) return "lime";
  return "red";
}

function colorCorriente(i){
  if(i<150) return "lime";
  if(i<=170) return "orange";
  return "red";
}

// aguja
function setNeedle(id, val, min, max){
  let ang = (val-min)/(max-min)*180-90;
  let el = document.getElementById(id);
  el.style.transition="0.5s";
  el.style.transform=`rotate(${ang}deg)`;
}

// alarma
function checkAlarm(v1,v2,v3,i1,i2,i3){
  let alarma = (
    v1<210 || v1>240 ||
    v2<210 || v2>240 ||
    v3<210 || v3>240 ||
    i1>170 || i2>170 || i3>170
  );
  document.getElementById("alarm").classList.toggle("active", alarma);
}

// simulación
setInterval(()=>{

let v1=220+Math.random()*20-10;
let v2=220+Math.random()*20-10;
let v3=220+Math.random()*20-10;

let i1=100+Math.random()*100;
let i2=100+Math.random()*100;
let i3=100+Math.random()*100;

v1=v1.toFixed(0); v2=v2.toFixed(0); v3=v3.toFixed(0);
i1=i1.toFixed(0); i2=i2.toFixed(0); i3=i3.toFixed(0);

// actualizar
document.getElementById("v1").innerText=v1+" V";
document.getElementById("v2").innerText=v2+" V";
document.getElementById("v3").innerText=v3+" V";

document.getElementById("i1").innerText=i1+" A";
document.getElementById("i2").innerText=i2+" A";
document.getElementById("i3").innerText=i3+" A";

// colores
v1el=document.getElementById("v1");
v2el=document.getElementById("v2");
v3el=document.getElementById("v3");

i1el=document.getElementById("i1");
i2el=document.getElementById("i2");
i3el=document.getElementById("i3");

v1el.style.color=colorTension(v1);
v2el.style.color=colorTension(v2);
v3el.style.color=colorTension(v3);

i1el.style.color=colorCorriente(i1);
i2el.style.color=colorCorriente(i2);
i3el.style.color=colorCorriente(i3);

// agujas
setNeedle("needleV1",v1,VMIN,VMAX);
setNeedle("needleV2",v2,VMIN,VMAX);
setNeedle("needleV3",v3,VMIN,VMAX);

setNeedle("needleI1",i1,IMIN,IMAX);
setNeedle("needleI2",i2,IMIN,IMAX);
setNeedle("needleI3",i3,IMIN,IMAX);

// alarma
checkAlarm(v1,v2,v3,i1,i2,i3);

},2000);

</script></body>
</html>
