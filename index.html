<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SCADA Transferencia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>SCADA - Transferencia Automática</h1>
</header>

<main>

  <!-- PANEL RED -->
  <section class="panel">
    <h2>RED</h2>

    <canvas id="gaugeVoltRed"></canvas>
    <canvas id="gaugeAmpRed"></canvas>

    <div class="values">
      <div>kW: <span id="kwRed">0</span></div>
      <div>FP: <span id="fpRed">0</span></div>
    </div>
  </section>

  <!-- PANEL GENERADOR -->
  <section class="panel">
    <h2>GENERADOR</h2>

    <canvas id="gaugeVoltGen"></canvas>
    <canvas id="gaugeAmpGen"></canvas>

    <div class="values">
      <div>kW: <span id="kwGen">0</span></div>
      <div>FP: <span id="fpGen">0</span></div>
    </div>
  </section>

  <!-- ESTADO -->
  <section class="transfer">
    <div class="state" id="stateRed">RED</div>
    <div class="state" id="stateFail">FALLA</div>
    <div class="state" id="stateStart">ARRANQUE</div>
    <div class="state" id="stateGen">GRUPO</div>
  </section>

  <!-- HISTORICO -->
  <section class="history">
    <canvas id="chart"></canvas>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
