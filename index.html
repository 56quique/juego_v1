<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCADA Transferencia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>SCADA - Transferencia Automática</h1>
</header>

<main>

  <!-- RED -->
  <section class="panel">
    <h2>RED</h2>

    <div class="grid-gauges">
      <canvas id="vRedL1"></canvas>
      <canvas id="vRedL2"></canvas>
      <canvas id="vRedL3"></canvas>

      <canvas id="iRedL1"></canvas>
      <canvas id="iRedL2"></canvas>
      <canvas id="iRedL3"></canvas>
    </div>

    <div class="values">
      <div>kW: <span id="kwRed">0</span></div>
      <div>FP: <span id="fpRed">0</span></div>
    </div>
  </section>

  <!-- GENERADOR -->
  <section class="panel">
    <h2>GENERADOR</h2>

    <div class="grid-gauges">
      <canvas id="vGenL1"></canvas>
      <canvas id="vGenL2"></canvas>
      <canvas id="vGenL3"></canvas>

      <canvas id="iGenL1"></canvas>
      <canvas id="iGenL2"></canvas>
      <canvas id="iGenL3"></canvas>
    </div>

    <div class="values">
      <div>kW: <span id="kwGen">0</span></div>
      <div>FP: <span id="fpGen">0</span></div>
    </div>
  </section>

  <!-- ESTADO -->
  <section class="transfer">
    <div class="state" id="stateRed">RED</div>
    <div class="state" id="stateFail">FALLA</div>
    <div class="state" id="stateStart">ARRANQUE</div>
    <div class="state" id="stateGen">GRUPO</div>
  </section>

  <!-- HISTORICO (base) -->
  <section class="history">
    <canvas id="chart"></canvas>
  </section>

</main>

<script src="aap.js"></script>
</body>
</html>
