<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>ATS - Panel SCADA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: #e5e7eb;
}

.header {
  text-align: center;
  padding: 15px;
  color: #38bdf8;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  padding: 15px;
}

@media (min-width: 700px) {
  .container { grid-template-columns: repeat(2, 1fr); }
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

/* GAUGE */
.gauge {
  position: relative;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: #1f2937;
  margin: 10px auto;
}

.needle {
  position: absolute;
  width: 2px;
  height: 50px;
  background: red;
  top: 10px;
  left: 50%;
  transform-origin: bottom center;
  transform: rotate(-90deg);
}

.center-dot {
  position: absolute;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  top: 55px;
  left: 50%;
  transform: translateX(-50%);
}

.value {
  margin-top: 5px;
  font-weight: bold;
  color: #38bdf8;
}

.gauge-container {
  display: flex;
  justify-content: space-around;
}

/* ALARMA */
.alarm-box {
  padding: 10px;
  border-radius: 8px;
  display: none;
}

.alarm-active {
  display: block;
  background: #7f1d1d;
  color: #fecaca;
}
</style></head><body><div class="header">⚡ ATS - Panel</div><div class="container">  <!-- ALARMA -->  <div class="card">
    <h3>Alarmas</h3>
    <div id="alarm" class="alarm-box">Falla de arranque</div>
  </div>  <!-- GAUGES -->  <div class="card">
    <h3>Tensión Red</h3>
    <div class="gauge-container">  <div>
    <div class="gauge">
      <div class="needle" id="n1"></div>
      <div class="center-dot"></div>
    </div>
    <div class="value" id="v1">220</div>
  </div>

  <div>
    <div class="gauge">
      <div class="needle" id="n2"></div>
      <div class="center-dot"></div>
    </div>
    <div class="value" id="v2">220</div>
  </div>

  <div>
    <div class="gauge">
      <div class="needle" id="n3"></div>
      <div class="center-dot"></div>
    </div>
    <div class="value" id="v3">220</div>
  </div>

</div>

  </div>  <!-- GRÁFICO -->  <div class="card" style="grid-column: span 2;">
    <h3>Histórico</h3>
    <canvas id="chart"></canvas>
  </div></div><script>

// -------- ALARMA --------
let falla = true;
function actualizarAlarma() {
  document.getElementById("alarm")
    .classList.toggle("alarm-active", falla);
}
actualizarAlarma();

// -------- AGUJAS --------
function setNeedle(id, valor, min=180, max=250) {
  let angulo = (valor - min) / (max - min) * 180 - 90;
  document.getElementById(id).style.transform =
    `rotate(${angulo}deg)`;
}

// -------- GRÁFICO --------
let chart = new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'L1',
      data: [],
      borderColor: 'cyan'
    }]
  },
  options: { responsive: true }
});

// -------- REFRESCO COMPLETO --------
function refrescarGrafico() {

  let labels = [];
  let data = [];

  for (let i = 0; i < 20; i++) {
    labels.push(i);
    data.push(220 + Math.random()*5);
  }

  chart.data.labels = labels;
  chart.data.datasets[0].data = data;
  chart.update();
}

// -------- SIMULACIÓN --------
setInterval(() => {

  let v1 = 220 + Math.random()*5;
  let v2 = 220 + Math.random()*5;
  let v3 = 220 + Math.random()*5;

  document.getElementById("v1").innerText = v1.toFixed(0);
  document.getElementById("v2").innerText = v2.toFixed(0);
  document.getElementById("v3").innerText = v3.toFixed(0);

  setNeedle("n1", v1);
  setNeedle("n2", v2);
  setNeedle("n3", v3);

}, 2000);

// refresco cada 10 segundos
setInterval(refrescarGrafico, 10000);
refrescarGrafico();

</script></body>
</html>
