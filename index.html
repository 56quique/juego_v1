<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>ATS - Panel SCADA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- Chart.js --><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #0b1220;
  color: #e5e7eb;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 20px;
  color: #38bdf8;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  padding: 15px;
}

@media (min-width: 700px) {
  .container { grid-template-columns: repeat(2, 1fr); }
}

/* CARD */
.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

/* GAUGE */
.gauge {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: conic-gradient(#22c55e 0deg, #1f2937 0deg);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 10px auto;
}

.gauge span {
  font-size: 18px;
  font-weight: bold;
}

/* MEDICIONES */
.measure {
  display: flex;
  justify-content: space-between;
  margin: 4px 0;
}

.value {
  color: #38bdf8;
  font-weight: bold;
}

/* ALARMA */
.alarm-box {
  padding: 10px;
  border-radius: 8px;
  display: none;
}

.alarm-active {
  display: block;
  background: #7f1d1d;
  color: #fecaca;
}
</style></head><body><div class="header">⚡ ATS - Monitoreo</div><div class="container">  <!-- ALARMA -->  <div class="card">
    <h3>Alarmas</h3>
    <div id="alarm" class="alarm-box">Falla de arranque</div>
  </div>  <!-- TENSIÓN RED -->  <div class="card">
    <h3>Tensión Red</h3>
    <div class="gauge" id="gaugeR"><span id="vRed">220 V</span></div>
    <div class="measure">L1 <span id="r1" class="value"></span></div>
    <div class="measure">L2 <span id="r2" class="value"></span></div>
    <div class="measure">L3 <span id="r3" class="value"></span></div>
  </div>  <!-- TENSIÓN GRUPO -->  <div class="card">
    <h3>Tensión Grupo</h3>
    <div class="gauge" id="gaugeG"><span id="vGrupo">0 V</span></div>
    <div class="measure">L1 <span id="g1" class="value"></span></div>
    <div class="measure">L2 <span id="g2" class="value"></span></div>
    <div class="measure">L3 <span id="g3" class="value"></span></div>
  </div>  <!-- CORRIENTE RED -->  <div class="card">
    <h3>Corriente Red (A)</h3>
    <div class="measure">L1 <span id="ir1" class="value"></span></div>
    <div class="measure">L2 <span id="ir2" class="value"></span></div>
    <div class="measure">L3 <span id="ir3" class="value"></span></div>
  </div>  <!-- CORRIENTE GRUPO -->  <div class="card">
    <h3>Corriente Grupo (A)</h3>
    <div class="measure">L1 <span id="ig1" class="value"></span></div>
    <div class="measure">L2 <span id="ig2" class="value"></span></div>
    <div class="measure">L3 <span id="ig3" class="value"></span></div>
  </div>  <!-- GRÁFICO -->  <div class="card" style="grid-column: span 2;">
    <h3>Tensión Red - Histórico</h3>
    <canvas id="chart"></canvas>
  </div></div><script>

// -------- ALARMA --------
let falla = true;
function actualizarAlarma() {
  document.getElementById("alarm")
    .classList.toggle("alarm-active", falla);
}
actualizarAlarma();

// -------- GAUGE --------
function actualizarGauge(id, valor, max=250) {
  let porcentaje = (valor / max) * 180;
  document.getElementById(id).style.background =
    `conic-gradient(#22c55e ${porcentaje}deg, #1f2937 ${porcentaje}deg)`;
}

// -------- GRÁFICO --------
let data = [];
let labels = [];

const chart = new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels,
    datasets: [{
      label: 'L1',
      data,
      borderColor: 'cyan'
    }]
  },
  options: { responsive: true }
});

// -------- SIMULACIÓN --------
setInterval(() => {

  let v1 = 220 + Math.random()*5;
  let v2 = 220 + Math.random()*5;
  let v3 = 220 + Math.random()*5;

  let i1 = 10 + Math.random()*5;
  let i2 = 12 + Math.random()*5;
  let i3 = 11 + Math.random()*5;

  // tensiones
  r1.innerText = v1.toFixed(0);
  r2.innerText = v2.toFixed(0);
  r3.innerText = v3.toFixed(0);

  // corrientes
  ir1.innerText = i1.toFixed(1);
  ir2.innerText = i2.toFixed(1);
  ir3.innerText = i3.toFixed(1);

  // gauge promedio
  let prom = (v1+v2+v3)/3;
  vRed.innerText = prom.toFixed(0) + " V";
  actualizarGauge("gaugeR", prom);

  // gráfico
  if (data.length > 20) {
    data.shift();
    labels.shift();
  }

  data.push(v1);
  labels.push("");
  chart.update();

}, 2000);

</script></body>
</html>
