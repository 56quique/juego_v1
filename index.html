<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<title>ATS - Panel SCADA PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
:root{
  --bg:#0b1220; --card:#111827; --muted:#9ca3af; --accent:#38bdf8;
  --green:#22c55e; --yellow:#f59e0b; --red:#ef4444;
}
*{box-sizing:border-box}
body{
  margin:0; font-family: "Segoe UI", Arial;
  background:var(--bg); color:#e5e7eb;
}
.header{
  text-align:center; padding:14px; font-weight:700; color:var(--accent);
}

.container{
  display:grid; gap:12px; padding:12px;
  grid-template-columns: 1fr;
}
@media (min-width: 600px){
  .container{ grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 1000px){
  .container{ grid-template-columns: repeat(3, 1fr); }
}

.card{
  background:var(--card); border-radius:14px; padding:12px;
}

.alarm{
  display:none; text-align:center; padding:10px;
  background:#7f1d1d; color:#fecaca;
}
.alarm.active{ display:block; }

.gauges-row{
  display:flex; gap:10px; justify-content:space-between; flex-wrap:wrap;
}
.gauge{
  flex:1; min-width: 100px; max-width: 160px;
  display:flex; flex-direction:column; align-items:center;
}
.value{
  margin-top:2px; font-weight:700;
}
</style></head><body><div class="header">⚡ ATS - Panel SCADA PRO</div><div class="container"><div class="card">
<h3>Alarmas</h3>
<div id="alarm" class="alarm">Falla por rango</div>
</div><!-- TENSION --><div class="card">
<h3>Tensión Red (V)</h3>
<div class="gauges-row"><!-- L1 --><div class="gauge">
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 80 20" stroke="var(--red)" stroke-width="10"/>
<path d="M80 20 A90 90 0 0 1 140 20" stroke="var(--green)" stroke-width="10"/>
<path d="M140 20 A90 90 0 0 1 190 100" stroke="var(--red)" stroke-width="10"/>
<g id="needleV1" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="valV1" class="value">0</div>
</div><!-- L2 --><div class="gauge">
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 80 20" stroke="var(--red)" stroke-width="10"/>
<path d="M80 20 A90 90 0 0 1 140 20" stroke="var(--green)" stroke-width="10"/>
<path d="M140 20 A90 90 0 0 1 190 100" stroke="var(--red)" stroke-width="10"/>
<g id="needleV2" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="valV2" class="value">0</div>
</div><!-- L3 --><div class="gauge">
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 80 20" stroke="var(--red)" stroke-width="10"/>
<path d="M80 20 A90 90 0 0 1 140 20" stroke="var(--green)" stroke-width="10"/>
<path d="M140 20 A90 90 0 0 1 190 100" stroke="var(--red)" stroke-width="10"/>
<g id="needleV3" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="valV3" class="value">0</div>
</div></div>
</div><!-- CORRIENTE --><div class="card">
<h3>Corriente Red (A)</h3>
<div class="gauges-row"><div class="gauge">
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 100 20" stroke="var(--green)" stroke-width="10"/>
<path d="M100 20 A90 90 0 0 1 140 40" stroke="var(--yellow)" stroke-width="10"/>
<path d="M140 40 A90 90 0 0 1 190 100" stroke="var(--red)" stroke-width="10"/>
<g id="needleI1" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="valI1" class="value">0</div>
</div><div class="gauge">
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 100 20" stroke="var(--green)" stroke-width="10"/>
<path d="M100 20 A90 90 0 0 1 140 40" stroke="var(--yellow)" stroke-width="10"/>
<path d="M140 40 A90 90 0 0 1 190 100" stroke="var(--red)" stroke-width="10"/>
<g id="needleI2" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="valI2" class="value">0</div>
</div><div class="gauge">
<svg viewBox="0 0 200 120">
<path d="M10 100 A90 90 0 0 1 100 20" stroke="var(--green)" stroke-width="10"/>
<path d="M100 20 A90 90 0 0 1 140 40" stroke="var(--yellow)" stroke-width="10"/>
<path d="M140 40 A90 90 0 0 1 190 100" stroke="var(--red)" stroke-width="10"/>
<g id="needleI3" style="transform-origin:100px 100px;">
<line x1="100" y1="100" x2="100" y2="25" stroke="red" stroke-width="3"/>
</g>
</svg>
<div id="valI3" class="value">0</div>
</div></div>
</div></div><script>

// NUEVOS RANGOS
const VMIN=0, VMAX=300;
const IMIN=0, IMAX=200;

// COLORES
function colorTension(v){
  if(v<210) return "#ef4444";
  if(v<=240) return "#22c55e";
  return "#ef4444";
}

function colorCorriente(i){
  if(i<150) return "#22c55e";
  if(i<=170) return "#f59e0b";
  return "#ef4444";
}

// AGUJA
function setNeedle(id, val, min, max){
  let ang = (val-min)/(max-min)*180-90;
  let el = document.getElementById(id);
  el.style.transform=`rotate(${ang}deg)`;
}

// ALARMA
function checkAlarm(v1,v2,v3,i1,i2,i3){
  let alarma = (
    v1<210 || v1>240 ||
    v2<210 || v2>240 ||
    v3<210 || v3>240 ||
    i1>170 || i2>170 || i3>170
  );
  document.getElementById("alarm").classList.toggle("active", alarma);
}

// SIMULACIÓN
setInterval(()=>{

let v1=220+Math.random()*40-20;
let v2=220+Math.random()*40-20;
let v3=220+Math.random()*40-20;

let i1=100+Math.random()*100;
let i2=100+Math.random()*100;
let i3=100+Math.random()*100;

document.getElementById("valV1").innerText=v1.toFixed(0)+" V";
document.getElementById("valV2").innerText=v2.toFixed(0)+" V";
document.getElementById("valV3").innerText=v3.toFixed(0)+" V";

document.getElementById("valI1").innerText=i1.toFixed(0)+" A";
document.getElementById("valI2").innerText=i2.toFixed(0)+" A";
document.getElementById("valI3").innerText=i3.toFixed(0)+" A";

valV1.style.color=colorTension(v1);
valV2.style.color=colorTension(v2);
valV3.style.color=colorTension(v3);

valI1.style.color=colorCorriente(i1);
valI2.style.color=colorCorriente(i2);
valI3.style.color=colorCorriente(i3);

setNeedle("needleV1",v1,VMIN,VMAX);
setNeedle("needleV2",v2,VMIN,VMAX);
setNeedle("needleV3",v3,VMIN,VMAX);

setNeedle("needleI1",i1,IMIN,IMAX);
setNeedle("needleI2",i2,IMIN,IMAX);
setNeedle("needleI3",i3,IMIN,IMAX);

checkAlarm(v1,v2,v3,i1,i2,i3);

},2000);

</script></body>
</html>
